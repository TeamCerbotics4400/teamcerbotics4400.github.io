<!DOCTYPE html>
<html lang="es-MX">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Team Mexico - Coming Soon</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 2rem;
      background: #0a0021;
      overflow-x: hidden;
    }
    .bg-image {
      position: fixed;
      inset: -40px;
      width: calc(100vw + 80px);
      height: calc(100vh + 80px);
      z-index: 0;
      object-fit: cover;
      filter: blur(12px);
      -webkit-filter: blur(12px);
    }
    .card {
      position: relative;
      z-index: 1;
      max-width: 600px;
      width: 100%;
      text-align: center;
      padding: 3rem 2rem;
      border-radius: 2rem;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      background: rgba(255,255,255,0.25);
    }
    .logo {
      max-width: 360px;
      width: 100%;
      height: auto;
      margin: 0 auto 2.5rem;
      filter: drop-shadow(0 4px 12px rgba(0,0,0,0.1));
    }
    .logo img {
      width: 100%;
      height: auto;
      display: block;
    }
    h1 {
      font-size: 2.2rem;
      font-weight: 300;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #1a1a1a;
      margin-bottom: 0.5rem;
    }
    .subtitle {
      font-size: 1rem;
      letter-spacing: 0.3em;
      color: #555;
      text-transform: uppercase;
      margin-bottom: 2rem;
    }
    .line {
      width: 60px;
      height: 2px;
      background: #E91E63;
      margin: 0 auto 2rem;
    }
    p {
      color: #333;
      line-height: 1.8;
      font-size: 0.95rem;
    }
    footer {
      margin-top: 3rem;
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      color: rgba(255,255,255,0.8);
      text-shadow: 0 1px 6px rgba(0,0,0,0.4);
      position: relative;
      z-index: 1;
    }
    @media (max-width: 480px) {
      h1 { font-size: 1.6rem; }
      .card { padding: 2rem 1.5rem; }
      .logo { max-width: 260px; }
    }
  </style>
</head>
<body>
  <img class="bg-image" src="fondo_generico.svg" alt="">

  <div class="card">
    <div class="logo">
      <img src="team_mexico_negro.svg" alt="Team Mexico">
    </div>
    <h1>Team Mexico</h1>
    <div class="line"></div>
    <div class="subtitle">Coming Soon</div>
    <p>Estamos trabajando en algo incre&iacute;ble.<br>Pronto compartiremos m&aacute;s detalles.</p>
  </div>
  <footer>&copy; 2026 Team Mexico &mdash; FIRST Global Challenge</footer>
</body>
</html>
